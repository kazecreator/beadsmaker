<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BeadMaker Submission Admin</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
  h1 { font-size: 24px; }
  .issue { background: white; border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .issue-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
  .issue-meta { color: #666; font-size: 13px; margin-bottom: 16px; }
  .pattern-grid { display: grid; gap: 2px; background: #ddd; border: 1px solid #ccc; width: fit-content; margin: 12px 0; }
  .pattern-cell { width: 8px; height: 8px; }
  .btn-row { display: flex; gap: 12px; margin-top: 16px; }
  button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  .approve { background: #34c759; color: white; }
  .reject { background: #ff3b30; color: white; }
  .desc { color: #333; font-size: 14px; margin: 8px 0; }
  .empty { text-align: center; color: #888; padding: 60px; }
  .link { font-size: 13px; color: #007aff; }
  .loader { text-align: center; padding: 40px; color: #888; }
  .refresh { float: right; font-size: 13px; color: #007aff; cursor: pointer; text-decoration: underline; }
  .label { display: inline-block; background: #e1ecf4; color: #39739d; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-right: 4px; }
</style>
</head>
<body>
<h1>🧵 BeadMaker Submission Admin <span class="refresh" onclick="load()">↻ Refresh</span></h1>
<div id="app"><div class="loader">Loading...</div></div>
<script>
const REPO = 'kazecreator/bead-maker';
const PAT = prompt('Paste your GitHub PAT (or set GITHUB_TOKEN in localStorage):', localStorage.getItem('gh_pat') || '');

if (PAT) {
  localStorage.setItem('gh_pat', PAT);
  load();
} else {
  document.getElementById('app').innerHTML = '<p style="color:red">Need GitHub PAT to load submissions. Refresh and enter your token.</p>';
}

async function gh(path, method='GET', body=null) {
  const r = await fetch(`https://api.github.com${path}`, {
    method,
    headers: { Authorization: `Bearer ${PAT}`, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

const COLORS = [
  '#ffffff','#000000','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff',
  '#c0c0c0','#808080','#800000','#808000','#008000','#800080','#008080','#000080',
  '#ffc0cb','#f0e68c','#d2691e','#696969','#ffa500','#800020','#00ced1','#4b0082',
  '#ee82ee','#6a5acd','#cd853f','#2f4f4f','#ff6347','#4682b4','#9acd32','#ba55d3'
];

function renderGrid(gridData, width, height, cellSize=8) {
  const canvas = document.createElement('canvas');
  canvas.width = width * cellSize;
  canvas.height = height * cellSize;
  const ctx = canvas.getContext('2d');
  for (let r = 0; r < height; r++) {
    for (let c = 0; c < width; c++) {
      const colorIndex = gridData[r * width + c] || 0;
      ctx.fillStyle = COLORS[colorIndex] || '#ffffff';
      ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
    }
  }
  return canvas.toDataURL();
}

async function load() {
  document.getElementById('app').innerHTML = '<div class="loader">Loading submissions...</div>';
  try {
    const issues = await gh(`/repos/${REPO}/issues?labels=marketplace-submission&state=open&per_page=50`);
    if (!issues.length) {
      document.getElementById('app').innerHTML = '<div class="empty">No pending submissions.<br><br>New submissions will appear here when users submit patterns.</div>';
      return;
    }
    let html = '';
    for (const issue of issues) {
      const body = issue.body || '';
      const jsonMatch = body.match(/```json\n([\s\S]*?)\n```/) || body.match(/```\n([\s\S]*?)\n```/) || [null, body];
      let patternData = null, previewUrl = '';
      try {
        patternData = JSON.parse(jsonMatch[1].trim());
        if (patternData && patternData.gridData && patternData.width && patternData.height) {
          previewUrl = renderGrid(patternData.gridData, patternData.width, patternData.height);
        } else if (patternData && patternData.pattern) {
          previewUrl = renderGrid(patternData.pattern.gridData || [], patternData.pattern.width || 0, patternData.pattern.height || 0);
        }
      } catch(e) {}
      const labels = issue.labels.map(l => `<span class="label">${l.name}</span>`).join('');
      html += `
      <div class="issue" id="issue-${issue.number}">
        <div class="issue-title">${issue.title}</div>
        <div class="issue-meta">#${issue.number} · ${new Date(issue.created_at).toLocaleString('zh')} · ${issue.user.login} ${labels}</div>
        ${patternData && patternData.description ? `<div class="desc">${patternData.description}</div>` : ''}
        ${previewUrl ? `<img src="${previewUrl}" style="max-width:300px;max-height:300px;border:1px solid #ccc;border-radius:8px;" />` : '<div style="color:#888;font-size:13px">No preview (pattern data not found in issue body)</div>'}
        <div class="btn-row">
          <button class="approve" onclick="approve(${issue.number}, '${issue.title}')">✓ Approve</button>
          <button class="reject" onclick="rejectIssue(${issue.number})">✗ Reject</button>
          <a class="link" href="${issue.html_url}" target="_blank">View on GitHub</a>
        </div>
      </div>`;
    }
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = `<p style="color:red">Error: ${e.message}</p>`;
  }
}

async function approve(number, title) {
  const jsonMatch = document.getElementById(`issue-${number}`)?.querySelector('img')?.src;
  // Get raw pattern data from issue
  const issue = await gh(`/repos/${REPO}/issues/${number}`);
  const body = issue.body || '';
  const match = body.match(/```json\n([\s\S]*?)\n```/) || body.match(/```\n([\s\S]*?)\n```/);
  if (!match) { alert('Could not parse pattern JSON from issue'); return; }
  let pattern;
  try { pattern = JSON.parse(match[1].trim()); } catch(e) { alert('Invalid JSON: ' + e.message); return; }
  
  const entry = {
    id: Date.now().toString(36),
    name: title.replace('[Marketplace Submission] ', '').split(' by ')[0] || 'Unnamed',
    author: issue.user.login,
    description: pattern.description || '',
    width: pattern.width,
    height: pattern.height,
    gridData: pattern.gridData,
    colorPalette: pattern.colorPalette || [],
    downloads: 0,
    submittedAt: issue.created_at,
    approvedAt: new Date().toISOString()
  };
  
  const approved = confirm(`Approve "${entry.name}" by ${entry.author}?\n\nThis will add it to patterns.json and close the issue.`);
  if (!approved) return;
  
  try {
    // Add to patterns.json via GitHub API
    const file = await gh(`/repos/${REPO}/contents/patterns.json`);
    const existing = JSON.parse(atob(file.content));
    existing.patterns = existing.patterns || [];
    existing.patterns.push(entry);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(existing, null, 2))));
    await gh(`/repos/${REPO}/contents/patterns.json`, 'PUT', {
      message: `feat: add "${entry.name}" to marketplace (approved)`,
      sha: file.sha,
      content
    });
    // Close issue
    await gh(`/repos/${REPO}/issues/${number}`, 'PATCH', { state: 'closed', labels: ['marketplace-submission', 'approved'] });
    document.getElementById(`issue-${number}`).remove();
    alert('Approved! Pattern is now live in marketplace.');
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function rejectIssue(number) {
  const confirmed = confirm(`Reject issue #${number}?\nThis will close the issue with a rejection comment.`);
  if (!confirmed) return;
  try {
    await gh(`/repos/${REPO}/issues/${number}`, 'PATCH', {
      state: 'closed',
      labels: ['marketplace-submission', 'rejected'],
      body: '谢谢投稿！很遗憾这次未能入选精选市场。有其他作品欢迎继续提交。'
    });
    document.getElementById(`issue-${number}`).remove();
    alert('Rejected and closed.');
  } catch(e) {
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
