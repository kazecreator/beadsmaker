name: BeadsMaker
options:
  bundleIdPrefix: com.kevinzhang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

schemes:
  BeadsMaker:
    build:
      targets:
        BeadsMaker: all
        BeadsMakerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BeadsMakerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release


targets:
  BeadsMaker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    sources:
      - path: BeadsMaker
    info:
      path: BeadsMaker/Info.plist
      properties:
        CFBundleDisplayName: BeadsMaker
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "12"
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: Photo library access is used to save finished PNG exports.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinzhang.beadsmaker
        DEVELOPMENT_TEAM: 84SJV77585
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies: []
  BeadsMakerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeadsMakerTests
    dependencies:
      - target: BeadsMaker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
