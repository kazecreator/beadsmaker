name: PixelBeads
options:
  bundleIdPrefix: com.kevinzhang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    from: 2.43.1

targets:
  PixelBeads:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    sources:
      - path: PixelBeads
    info:
      path: PixelBeads/Info.plist
      properties:
        CFBundleDisplayName: PixelBeads
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: Camera access is used to scan pattern QR codes.
        NSPhotoLibraryAddUsageDescription: Photo library access is used to save QR code images.
        NSPhotoLibraryUsageDescription: Photo library access is used to read QR code images.
        PB_SUPABASE_URL: $(SUPABASE_URL_SCHEME)://$(SUPABASE_URL_HOST)
        PB_SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinzhang.pixelbeads
        DEVELOPMENT_TEAM: 84SJV77585
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Supabase
        product: Supabase
  PixelBeadsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PixelBeadsTests
    dependencies:
      - target: PixelBeads
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
