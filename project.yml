name: PixelBeads
options:
  bundleIdPrefix: com.kevinzhang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

schemes:
  PixelBeads:
    build:
      targets:
        PixelBeads: all
        PixelBeadsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PixelBeadsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release


targets:
  PixelBeads:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    sources:
      - path: PixelBeads
    info:
      path: PixelBeads/Info.plist
      properties:
        CFBundleDisplayName: PixelBeads
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: Photo library access is used to save finished PNG exports.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinzhang.pixelbeads
        DEVELOPMENT_TEAM: 84SJV77585
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies: []
  PixelBeadsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PixelBeadsTests
    dependencies:
      - target: PixelBeads
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
